<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cuve carburant - TimeMachine</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      color: white;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
    }

    .status {
      display: none;
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.95rem;
      min-width: 220px;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .status small {
      display: block;
      margin-top: 4px;
      opacity: 0.75;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <video id="tankVideo" playsinline muted preload="auto">
    <source src="/Liquide/final.mp4" type="video/mp4">
  </video>

  <div class="status">
    Energie: <span id="energyDisplay">0</span>% (palier <span id="levelDisplay">0</span>%)
    <small id="connDisplay">Connexion: initialisation...</small>
  </div>

  <script>
    const video = document.getElementById("tankVideo");
    const energyDisplay = document.getElementById("energyDisplay");
    const levelDisplay = document.getElementById("levelDisplay");
    const connDisplay = document.getElementById("connDisplay");

    const timecodes = {
      0: 0.000,
      10: 0.873,
      20: 3.850,
      30: 5.018,
      40: 5.881,
      50: 6.566,
      60: 7.317,
      70: 7.852,
      80: 8.502,
      90: 9.480,
      100: 10.583
    };

    let targetTime = 0;
    let lastEnergy = 0;
    let metadataReady = false;
    let fallbackTimer = null;

    function nearestLevel(energyPercent) {
      const clamped = Math.max(0, Math.min(100, Number(energyPercent) || 0));
      return Math.floor(clamped / 10) * 10;
    }

    function seekToTargetFromEnergy(energyPercent) {
      const level = nearestLevel(energyPercent);
      const nextTarget = timecodes[level] ?? 0;

      energyDisplay.textContent = String(Math.max(0, Math.min(100, Number(energyPercent) || 0)));
      levelDisplay.textContent = String(level);

      if (!metadataReady) {
        targetTime = nextTarget;
        return;
      }

      targetTime = nextTarget;

      if (video.currentTime < targetTime) {
        video.play().catch(() => {
          // iPad policies can block autoplay in edge cases.
        });
      } else {
        video.currentTime = targetTime;
        video.pause();
      }
    }

    async function fetchStateOnce() {
      try {
        const response = await fetch("/api/state", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }
        const data = await response.json();
        if (typeof data.energyPercent === "number") {
          lastEnergy = data.energyPercent;
          seekToTargetFromEnergy(lastEnergy);
        }
      } catch (_error) {
        // Silent retry by caller.
      }
    }

    function startFallbackPolling() {
      if (fallbackTimer) {
        return;
      }
      fallbackTimer = window.setInterval(fetchStateOnce, 2500);
    }

    function stopFallbackPolling() {
      if (!fallbackTimer) {
        return;
      }
      window.clearInterval(fallbackTimer);
      fallbackTimer = null;
    }

    function connectSSE() {
      if (!window.EventSource) {
        connDisplay.textContent = "Connexion: fallback polling";
        startFallbackPolling();
        return;
      }

      const evt = new EventSource("/events");
      evt.addEventListener("open", () => {
        connDisplay.textContent = "Connexion: SSE active";
        stopFallbackPolling();
      });

      evt.addEventListener("state", (event) => {
        try {
          const data = JSON.parse(event.data);
          if (typeof data.energyPercent === "number") {
            lastEnergy = data.energyPercent;
            seekToTargetFromEnergy(lastEnergy);
          }
        } catch (_error) {
          // Ignore malformed events.
        }
      });

      evt.addEventListener("error", () => {
        connDisplay.textContent = "Connexion: SSE instable, fallback actif";
        startFallbackPolling();
      });
    }

    video.addEventListener("timeupdate", () => {
      if (video.currentTime >= targetTime) {
        video.pause();
        video.currentTime = targetTime;
      }
    });

    video.addEventListener("loadedmetadata", () => {
      metadataReady = true;
      video.currentTime = timecodes[0];
      seekToTargetFromEnergy(lastEnergy);
    });

    fetchStateOnce();
    connectSSE();
  </script>
</body>
</html>
